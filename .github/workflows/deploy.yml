name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/groundwork-web/package-lock.json

      - name: Install npm deps
        working-directory: crates/groundwork-web
        run: npm ci

      - name: Build WASM
        working-directory: crates/groundwork-web
        run: npm run wasm

      - name: Copy WASM to public
        run: |
          mkdir -p crates/groundwork-web/public/wasm
          cp crates/groundwork-web/wasm/groundwork_sim_bg.wasm crates/groundwork-web/public/wasm/
          cp crates/groundwork-web/wasm/groundwork_sim.js crates/groundwork-web/public/wasm/

      - name: Build production
        working-directory: crates/groundwork-web
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/groundwork-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
