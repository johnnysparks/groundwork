<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groundwork</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23445533'/><text x='16' y='24' text-anchor='middle' font-size='22'>🌱</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; width: 100%; height: 100%; }
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1815;
      transition: opacity 0.8s ease;
      gap: 12px;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 {
      font-size: 2.8rem; font-weight: 300; letter-spacing: 8px;
      text-transform: uppercase; color: #e8d8b8;
      margin: 0;
    }
    #loading p {
      font-size: 0.9rem; color: rgba(200, 180, 140, 0.5);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Groundwork</h1>
    <p>growing your garden...</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
